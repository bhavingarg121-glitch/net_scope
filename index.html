<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>NetScope India</title>

<!-- Leaflet CSS -->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0b1020;
    overflow:hidden;
}

/* MAP */
#map{
    width:100%;
    height:100vh;
}

/* TOP PANEL */
.panel{
    position:absolute;
    top:20px;
    left:20px;
    z-index:1000;

    width:320px;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.1);

    border-radius:20px;

    padding:20px;

    color:white;

    box-shadow:0 0 25px rgba(0,0,0,0.3);
}

/* TITLE */
.panel h1{
    font-size:28px;
    margin-bottom:10px;
}

.panel p{
    color:#cfcfcf;
    font-size:14px;
    line-height:1.5;
    margin-bottom:20px;
}

/* SELECT */
select{
    width:100%;
    padding:12px;
    border:none;
    outline:none;

    border-radius:12px;

    background:#1c2541;
    color:white;

    margin-bottom:15px;
}

/* BUTTON */
button{
    width:100%;
    padding:14px;

    border:none;
    border-radius:12px;

    background:linear-gradient(45deg,#00c6ff,#0072ff);

    color:white;
    font-size:16px;
    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
}

/* STATUS */
.status{
    margin-top:15px;
    font-size:14px;
    color:#9fe870;
}

/* LEGEND */
.legend{
    margin-top:20px;
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.legend div{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:13px;
}

.dot{
    width:12px;
    height:12px;
    border-radius:50%;
}

.green{
    background:#00ff88;
}

.yellow{
    background:#ffd000;
}

.red{
    background:#ff4d4d;
}

</style>
</head>
<body>

<!-- PANEL -->
<div class="panel">

    <h1>📡 NetScope</h1>

    <p>
        Live crowdsourced internet quality map for India.
        Compare Jio, Airtel, Vi & BSNL coverage.
    </p>

    <!-- NETWORK SELECT -->
    <select id="network">
        <option value="Jio">Jio</option>
        <option value="Airtel">Airtel</option>
        <option value="Vi">Vi</option>
        <option value="BSNL">BSNL</option>
    </select>

    <!-- BUTTON -->
    <button onclick="startTest()">
        Start Network Check
    </button>

    <!-- STATUS -->
    <div class="status" id="status">
        Waiting for test...
    </div>

    <!-- LEGEND -->
    <div class="legend">

        <div>
            <span class="dot green"></span>
            Good
        </div>

        <div>
            <span class="dot yellow"></span>
            Average
        </div>

        <div>
            <span class="dot red"></span>
            Poor
        </div>

    </div>

</div>

<!-- MAP -->
<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// INDIA MAP
const map = L.map('map').setView([22.9734, 78.6569], 5);

// TILE
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap'
}).addTo(map);

// START TEST
function startTest(){

    const status = document.getElementById("status");
    const network = document.getElementById("network").value;

    status.innerHTML = "Detecting location...";

    // GET LOCATION
    navigator.geolocation.getCurrentPosition(

        (position)=>{

            const lat = position.coords.latitude;
            const lng = position.coords.longitude;

            // RANDOM DEMO SPEED
            const speed = Math.floor(Math.random()*100)+1;

            let color = "red";

            if(speed > 60){
                color = "green";
            }
            else if(speed > 30){
                color = "yellow";
            }

            // MARKER
            const marker = L.circleMarker([lat,lng],{

                radius:12,

                fillColor:color,

                color:"#fff",

                weight:2,

                fillOpacity:0.8

            }).addTo(map);

            // POPUP
            marker.bindPopup(`
                <b>${network}</b><br>
                Speed: ${speed} Mbps
            `);

            // MOVE MAP
            map.setView([lat,lng],13);

            // STATUS
            status.innerHTML = `
                ${network} Speed: ${speed} Mbps
            `;

        },

        ()=>{

            status.innerHTML = "Location permission denied.";

        }

    );

}

</script>

</body>
</html>
