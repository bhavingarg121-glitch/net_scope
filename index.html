<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NetScope AI Telecom Comparator</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#050816;

}

#map{

height:100vh;
}

/* PANEL */
.panel{
position:absolute;
top:15px;
left:15px;
width:320px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
padding:15px;
border-radius:15px;
z-index:999;
}

select,button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:10px;
}

button{
background:#00c6ff;
color:white;
font-weight:bold;
cursor:pointer;
}

/* RESULT BOX */
.box{
margin-top:10px;
padding:10px;
background:#101935;
border-radius:10px;
font-size:13px;
}

/* TOP STATS */
.top{
position:absolute;
top:15px;
right:15px;
display:grid;
grid-template-columns:repeat(2,140px);
gap:10px;
z-index:999;
}

.stat{
background:rgba(255,255,255,0.08);
padding:10px;
border-radius:10px;
text-align:center;
}

.good{color:#00ff88}
.mid{color:#ffd000}
.bad{color:#ff4d4d}
</style>
</head>

<body>

<option>Jio</option>

</select>

<div class="box" id="compare">Comparison: --</div>

<div class="stat">Signal<br><b id="signal">0</b></div>
<div class="stat">Quality<br><b id="quality">--</b></div>
</div>

<div id="map"></div>

<script>
/* ================= MAP ================= */
const map = L.map("map").setView([22.9734,78.6569],5);

L.tileLayer(
"https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png"
).addTo(map);

/* ================= TOWERS ================= */
const towers = {
"Jio":[[28.6,77.2],[19.1,72.8]],
"Airtel":[[28.7,77.1],[13.0,80.2]],
"Vi":[[19.0,72.9],[22.5,88.3]],
"BSNL":[[26.9,75.8],[17.4,78.4]]
};

function drawTowers(){
Object.keys(towers).forEach(op=>{
towers[op].forEach(t=>{
L.circle(t,{
radius:50000,
color:"#00ff88",
fillOpacity:0.05
}).addTo(map).bindPopup(op+" Tower");
});
});
}
drawTowers();

/* ================= SIGNAL MODEL ================= */
function signalStrength(lat,lng,op){

let base = 0;

towers[op].forEach(t=>{
let d = Math.hypot(lat-t[0], lng-t[1]);
base += 1/(d+0.1);
});

return Math.min(base*60,100);
}

/* ================= QUALITY ================= */
function quality(speed,ping,signal){

let q = (speed*0.5) + (signal*0.4) - (ping*0.3);

if(q>70) return {text:"EXCELLENT",cls:"good"};
if(q>40) return {text:"GOOD",cls:"mid"};
return {text:"POOR",cls:"bad"};
}

/* ================= COMPARE ================= */
function compareAll(lat,lng){

let results = [];

Object.keys(towers).forEach(op=>{
let s = signalStrength(lat,lng,op);
results.push({op,signal:s});
});

results.sort((a,b)=>b.signal-a.signal);

return results;
}
