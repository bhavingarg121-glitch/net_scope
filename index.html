<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NetScope AI Telecom Control Center</title>

<!-- TensorFlow -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>
body{
margin:0;
background:#050816;
color:white;
font-family:Poppins, sans-serif;
overflow:hidden;
}

#map{
width:100%;
height:100vh;
}

.panel{
position:absolute;
top:15px;
left:15px;
width:320px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
padding:15px;
border-radius:15px;
z-index:999;
}

.btn{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:10px;
background:#00c6ff;
color:white;
font-weight:bold;
cursor:pointer;
}

.card{
margin-top:10px;
padding:10px;
background:#101935;
border-radius:10px;
font-size:13px;
}

.topbar{
position:absolute;
top:15px;
right:15px;
display:flex;
gap:10px;
z-index:999;
}

.stat{
background:rgba(255,255,255,0.08);
padding:10px;
border-radius:10px;
min-width:120px;
text-align:center;
}
</style>
</head>

<body>

<div class="panel">
<h3>📡 NetScope AI Telecom</h3>

<button class="btn" onclick="startTest()">Run Network Test</button>

<div class="card" id="status">Waiting...</div>
<div class="card" id="ai">AI Loading...</div>
<div class="card" id="risk">Risk: --</div>
</div>

<div class="topbar">
<div class="stat">Speed <br><b id="speed">0</b></div>
<div class="stat">Ping <br><b id="ping">0</b></div>
<div class="stat">Users <br><b id="users">500</b></div>
<div class="stat">Outages <br><b id="outages">0</b></div>
</div>

<div id="map"></div>

<script>
/* ================= MAP ================= */
const map = L.map("map").setView([22.9734,78.6569],5);

L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png")
.addTo(map);

/* ================= TOWERS ================= */
const towers = [
[28.61,77.20],[19.07,72.87],[13.08,80.27],
[22.57,88.36],[26.91,75.78]
];

towers.forEach(t=>{
L.circle(t,{
radius:50000,
color:"#00ff88",
fillOpacity:0.05
}).addTo(map);
});

/* ================= HEAT ================= */
const heat = L.heatLayer([
[28.61,77.20,0.9],
[19.07,72.87,0.8],
[13.08,80.27,0.7]
]).addTo(map);

/* ================= AI MODEL ================= */
let model;

async function initAI(){
model = tf.sequential();

model.add(tf.layers.dense({
units:16,
inputShape:[3],
activation:"relu"
}));

model.add(tf.layers.dense({
units:1,
activation:"sigmoid"
}));

model.compile({
optimizer:"adam",
loss:"binaryCrossentropy"
});

document.getElementById("ai").innerText =
"AI Engine Ready (TF.js)";
}
initAI();

/* ================= SIGNAL ================= */
function signal(lat,lng){
let s=0;
towers.forEach(t=>{
let d=Math.hypot(lat-t[0],lng-t[1]);
s += 1/(d+0.1);
});
return Math.min(s*50,100);
}

/* ================= PREDICT ================= */
function predict(speed,ping,users){
const input = tf.tensor2d([[speed/100,ping/100,users/1000]]);
const out = model.predict(input);
return out.dataSync()[0];
}

/* ================= LIVE DATA ================= */
let users=500;
let outages=0;

/* ================= TEST ================= */
function startTest(){

navigator.geolocation.getCurrentPosition(pos=>{

const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

const speed=Math.random()*100;
const ping=Math.random()*60;

const sig=signal(lat,lng);
const risk=predict(speed,ping,users);

document.getElementById("speed").innerText=Math.round(speed);
document.getElementById("ping").innerText=Math.round(ping);
document.getElementById("users").innerText=users;

let level="LOW 🟢";
if(risk>0.7) level="HIGH 🔴";
else if(risk>0.4) level="MED 🟠";

document.getElementById("risk").innerText=
"Outage Risk: "+level;

document.getElementById("status").innerText=
`Speed ${Math.round(speed)} Mbps | Ping ${Math.round(ping)} ms | Signal ${Math.round(sig)}`;

L.circleMarker([lat,lng],{
radius:10,
color: risk>0.7?"red":"green"
}).addTo(map);

map.setView([lat,lng],10);

if(risk>0.7 || sig<20){
outages++;
document.getElementById("outages").innerText=outages;

L.circle([lat,lng],{
radius:40000,
color:"red",
fillOpacity:0.1
}).addTo(map);
}

});

}

/* ================= SIMULATION ================= */
setInterval(()=>{
users += Math.floor(Math.random()*10);
document.getElementById("users").innerText=users;
},3000);

</script>

</body>
</html>
