<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>NetScope India </title>

<!-- TensorFlow.js AI -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#050816;
color:white;
overflow:hidden;
}

/* MAP */
#map{
width:100%;
height:100vh;
}

/* CONTROL CENTER */
.panel{
position:absolute;
top:15px;
left:15px;
width:320px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
padding:15px;
border-radius:16px;
z-index:1000;
}

.title{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

.box{
background:#101935;
padding:10px;
margin-top:10px;
border-radius:10px;
font-size:13px;
}

/* RIGHT DASHBOARD */
.dashboard{
position:absolute;
right:15px;
top:15px;
width:300px;
z-index:1000;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
padding:15px;
border-radius:16px;
}

/* HEALTH INDEX */
.health{
font-size:22px;
font-weight:bold;
color:#00ff88;
}

/* CHART */
.chartBox{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
width:500px;
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:16px;
z-index:1000;
}
</style>
</head>

<body>

<!-- AI CONTROL CENTER -->
<div class="panel">
<div class="title">📡 Telecom AI Control Center</div>

<div class="box">
Network: 
<select id="network">
<option>Jio</option>
<option>Airtel</option>
<option>Vi</option>
<option>BSNL</option>
</select>
</div>

<div class="box">
AI Risk: <span id="aiRisk">0%</span>
</div>

<div class="box">
Outage Forecast: <span id="forecast">Stable</span>
</div>

<button onclick="runTest()" style="margin-top:10px;width:100%">
Run Network Test
</button>

<div class="box" id="status">Waiting...</div>
</div>

<!-- DASHBOARD -->
<div class="dashboard">
<div>📊 INDIA TELECOM HEALTH INDEX</div>
<div class="health" id="healthIndex">87</div>

<div class="box">
Live Users: <span id="users">1200</span>
</div>

<div class="box">
Outages: <span id="outages">0</span>
</div>
</div>

<!-- CHART -->
<div class="chartBox">
<canvas id="chart"></canvas>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- LEAFLET -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ================= MAP =================
const map = L.map("map").setView([22.9734,78.6569],5);

L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png")
.addTo(map);

// ================= AI MODEL (LSTM-like simulation) =================
let model;

async function initAI(){

model = tf.sequential();

model.add(tf.layers.dense({inputShape:[3],units:16,activation:"relu"}));
model.add(tf.layers.dense({units:8,activation:"relu"}));
model.add(tf.layers.dense({units:1,activation:"sigmoid"}));

model.compile({optimizer:"adam",loss:"binaryCrossentropy"});

console.log("AI Telecom Engine Ready");
}

initAI();

// ================= PREDICT =================
function predict(speed,ping,users){

const input = tf.tensor2d([[speed/100,ping/100,users/2000]]);
const output = model.predict(input);
return output.dataSync()[0];

}

// ================= TELECOM HEALTH =================
let health = 87;
let users = 1200;
let outages = 0;

function updateUI(){
document.getElementById("users").innerText = users;
document.getElementById("outages").innerText = outages;
document.getElementById("healthIndex").innerText = health;
}

// ================= CHART =================
const chart = new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:[],
datasets:[{
label:"Network Speed",
data:[],
borderColor:"#00ff88"
}]
}
});

// ================= RUN TEST =================
function runTest(){

navigator.geolocation.getCurrentPosition(pos=>{

const lat = pos.coords.latitude;
const lng = pos.coords.longitude;

const speed = Math.random()*100;
const ping = Math.random()*60;

const risk = predict(speed,ping,users);

document.getElementById("aiRisk").innerText =
Math.round(risk*100)+"%";

document.getElementById("forecast").innerText =
risk>0.7?"⚠ High Risk":risk>0.4?"Medium":"Stable";

// MAP MARKER
L.circleMarker([lat,lng],{
radius:10,
color:risk>0.7?"red":"#00ff88"
}).addTo(map);

map.setView([lat,lng],6);

// HEALTH ENGINE
health = Math.max(40,health - risk*5);
users += Math.floor(Math.random()*50);

if(risk>0.7) outages++;

updateUI();

// CHART
chart.data.labels.push("T"+chart.data.labels.length);
chart.data.datasets[0].data.push(speed);
chart.update();

document.getElementById("status").innerText =
`Speed: ${speed.toFixed(1)} Mbps | Ping: ${ping.toFixed(1)} ms`;

});

}

// ================= LIVE SIMULATION =================
setInterval(()=>{
users += Math.floor(Math.random()*20);
health += (Math.random()-0.5)*2;
updateUI();
},3000);

console.log("🚀 NetScope AI Telecom Control Center Loaded");
</script>

</body>
</html>
