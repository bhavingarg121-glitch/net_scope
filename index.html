
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NetScope India </title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#050816;
color:white;
overflow:hidden;
}

#map{
width:100%;
height:100vh;
}

.panel,.rightPanel{
position:absolute;
top:15px;
width:340px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
padding:15px;
border-radius:16px;
z-index:999;
border:1px solid rgba(255,255,255,0.1);
}

.panel{left:15px;}
.rightPanel{right:15px;width:320px;}

select,button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:10px;
}

button{
background:#00c6ff;
color:white;
font-weight:bold;
cursor:pointer;
}

.box{
margin-top:10px;
padding:10px;
background:#101935;
border-radius:10px;
font-size:13px;
}

.good{color:#00ff88}
.mid{color:#ffd000}
.bad{color:#ff4d4d}

h3{margin:0}
</style>
</head>

<body>

<!-- LEFT PANEL -->
<div class="panel">
<h3>📡 Telecom AI Comparator</h3>

<select id="operator">
<option>Jio</option>
<option>Airtel</option>
<option>Vi</option>
<option>BSNL</option>
</select>

<button onclick="runTest()">🚀 Run Network Test</button>

<div class="box" id="status">Waiting...</div>
<div class="box" id="best">Best Network: --</div>

<canvas id="chart" height="160"></canvas>
</div>

<!-- RIGHT PANEL -->
<div class="rightPanel">
<h3>📊 Control Center</h3>

<div class="box">
Selected: <b id="selectedOp">--</b><br>
Speed: <span id="speedVal">0</span> Mbps<br>
Ping: <span id="pingVal">0</span> ms<br>
Signal: <span id="signalVal">0</span><br>
Quality Score: <b id="qualityVal">--</b>
</div>

<div class="box">
Best Network:
<div id="compareBox">Run test</div>
</div>
</div>

<div id="map"></div>

<script>
const map = L.map("map").setView([22.9734,78.6569],5);

L.tileLayer(
"https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png"
).addTo(map);

/* ================= TOWERS ================= */
const towers = {
Jio:[[28.6,77.2],[19.1,72.8]],
Airtel:[[28.7,77.1],[13.0,80.2]],
Vi:[[19.0,72.9],[22.5,88.3]],
BSNL:[[26.9,75.8],[17.4,78.4]]
};

/* ================= SIGNAL ================= */
function signal(lat,lng,op){
let s=0;
towers[op].forEach(t=>{
let d=Math.hypot(lat-t[0],lng-t[1]);
s+=1/(d+0.1);
});
return Math.min(s*60,100);
}

/* ================= REAL QUALITY SCORE ================= */
function score(speed,ping,signal){
return (speed*0.5)+(signal*0.4)-(ping*0.3);
}

/* ================= CHART ================= */
const chart = new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Jio","Airtel","Vi","BSNL"],
datasets:[{
label:"Score",
data:[0,0,0,0],
backgroundColor:["#00ff88","#00c6ff","#ffd000","#ff4d4d"]
}]
},
options:{plugins:{legend:{display:false}}}
});

/* ================= UPDATE ================= */
function updateChart(data){
chart.data.datasets[0].data=data;
chart.update();
}

/* ================= RUN TEST ================= */
function runTest(){

navigator.geolocation.getCurrentPosition(pos=>{

const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

const speed=Math.random()*100;
const ping=Math.random()*60;

const op=document.getElementById("operator").value;

/* SCORES */
const jio = score(speed,ping,signal(lat,lng,"Jio"));
const airtel = score(speed,ping,signal(lat,lng,"Airtel"));
const vi = score(speed,ping,signal(lat,lng,"Vi"));
const bsnl = score(speed,ping,signal(lat,lng,"BSNL"));

/* BEST NETWORK */
let best="Jio";
let max=jio;

if(airtel>max){max=airtel;best="Airtel";}
if(vi>max){max=vi;best="Vi";}
if(bsnl>max){max=bsnl;best="BSNL";}

/* UI */
document.getElementById("status").innerHTML=
`Speed: ${speed.toFixed(1)} Mbps<br>Ping: ${ping.toFixed(1)} ms`;

document.getElementById("best").innerHTML=
"🏆 Best Network: <b>"+best+"</b>";

document.getElementById("selectedOp").innerText=op;
document.getElementById("speedVal").innerText=speed.toFixed(1);
document.getElementById("pingVal").innerText=ping.toFixed(1);
document.getElementById("signalVal").innerText=signal(lat,lng,op).toFixed(1);
document.getElementById("qualityVal").innerText=score(speed,ping,signal(lat,lng,op)).toFixed(1);

/* CHART */
updateChart([
jio.toFixed(1),
airtel.toFixed(1),
vi.toFixed(1),
bsnl.toFixed(1)
]);

/* MAP */
L.circleMarker([lat,lng],{
radius:8,
color:"#00ff88"
}).addTo(map);

map.setView([lat,lng],10);

});
}
</script>

</body>
</html>
