<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>NetScope India </title>

<!-- SEO -->
<meta name="description" content="Realtime telecom intelligence platform for India"/>
<meta name="theme-color" content="#050816"/>

<!-- FAVICON -->
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/483/483947.png"/>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<!-- AOS -->
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet"/>

<!-- CHART -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050816;
overflow:hidden;
color:white;
}

/* MAP */
#map{
width:100%;
height:100vh;
}

/* AI PANEL (NEW) */
.aiPanel{
position:absolute;
top:20px;
left:20px;
z-index:1100;
width:300px;
padding:15px;
border-radius:18px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.1);
}

.box{
margin-top:10px;
padding:10px;
border-radius:12px;
background:#101935;
font-size:13px;
}

/* STATUS PANEL (NEW) */
.statusPanel{
position:absolute;
bottom:20px;
left:20px;
z-index:1100;
width:300px;
padding:15px;
border-radius:18px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
}

/* SIDEBAR */
.sidebar{
position:absolute;
top:20px;
right:20px;
width:350px;
z-index:1100;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
border-radius:28px;
padding:24px;
border:1px solid rgba(255,255,255,0.1);
overflow-y:auto;
max-height:95vh;
}

.logo h1{
background:linear-gradient(45deg,#00c6ff,#00ff88);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
font-size:28px;
}

/* STATS */
.stats{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
display:grid;
grid-template-columns:repeat(4,160px);
gap:12px;
z-index:1100;
}

.card{
background:rgba(255,255,255,0.08);
padding:12px;
border-radius:14px;
text-align:center;
}

/* CHART */
.chart-container{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:500px;
z-index:1100;
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:18px;
}

</style>
</head>

<body>

<!-- AI ENGINE PANEL -->
<div class="aiPanel">
<h3>🤖 AI NETWORK ENGINE</h3>

<div class="box" id="aiRisk">AI analyzing network...</div>
<div class="box" id="outagePredict">Outage Risk: LOW</div>
</div>

<!-- STATUS PANEL -->
<div class="statusPanel">
<div>🟢 Live Simulation Active</div>
<div class="box" id="activityFeed">Waiting for activity...</div>

<div class="box">
Live Users: <span id="liveUsers">0</span><br/>
Tests Today: <span id="testsToday">0</span><br/>
Outages: <span id="outages">0</span>
</div>
</div>

<!-- STATS -->
<div class="stats">
<div class="card"><h3>Speed</h3><h2 id="avgSpeed">0</h2></div>
<div class="card"><h3>Ping</h3><h2 id="avgPing">0</h2></div>
<div class="card"><h3>Tests</h3><h2 id="tests">0</h2></div>
<div class="card"><h3>Status</h3><h2 id="liveStatus">ONLINE</h2></div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="logo">
<h1>📡 NetScope</h1>
</div>

<div class="box">Realtime Telecom Intelligence Platform</div>

<select id="network">
<option>Jio</option>
<option>Airtel</option>
<option>Vi</option>
<option>BSNL</option>
</select>

<button onclick="startTest()">🚀 Start Test</button>

<div class="box" id="status">Waiting...</div>

<div class="box" id="aiInsight">AI Insight...</div>

</div>

<!-- CHART -->
<div class="chart-container">
<canvas id="speedChart"></canvas>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- LIBS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>AOS.init();</script>

<!-- FIREBASE -->
<script type="module" src="firebase.js"></script>

<!-- APP -->
<script src="app.js"></script>

</body>
</html>
