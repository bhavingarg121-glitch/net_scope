<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NetScope India </title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#050816;
color:white;
overflow:hidden;
}

/* MAP */
#map{
width:100%;
height:100vh;
}

/* LEFT PANEL */
.panel{
position:absolute;
top:15px;
left:15px;
width:340px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
padding:15px;
border-radius:16px;
z-index:999;
border:1px solid rgba(255,255,255,0.1);
}

select,button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:10px;
}

button{
background:#00c6ff;
color:white;
font-weight:bold;
cursor:pointer;
}

/* RIGHT PANEL (NEW CONTROL CENTER) */
.rightPanel{
position:absolute;
top:15px;
right:15px;
width:320px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
padding:15px;
border-radius:16px;
z-index:999;
border:1px solid rgba(255,255,255,0.1);
}

.box{
margin-top:10px;
padding:10px;
background:#101935;
border-radius:10px;
font-size:13px;
line-height:1.5;
}

.statTitle{
font-size:12px;
opacity:0.7;
}

.good{color:#00ff88}
.mid{color:#ffd000}
.bad{color:#ff4d4d}

h3{margin:0}
</style>
</head>

<body>

<!-- LEFT CONTROL -->
<div class="panel">
<h3>📡 Telecom AI Comparator</h3>

<select id="operator">
<option>Jio</option>
<option>Airtel</option>
<option>Vi</option>
<option>BSNL</option>
</select>

<button onclick="runTest()">🚀 Run Network Test</button>

<div class="box" id="status">Waiting for test...</div>
<div class="box" id="best">Best Network: --</div>

<canvas id="chart" height="160"></canvas>
</div>

<!-- RIGHT CONTROL CENTER -->
<div class="rightPanel">
<h3>📊 Network Control Center</h3>

<div class="box">
<div class="statTitle">Selected Operator</div>
<div id="selectedOp">--</div>
</div>

<div class="box">
<div class="statTitle">Speed (Mbps)</div>
<div id="speedVal">0</div>

<div class="statTitle">Ping (ms)</div>
<div id="pingVal">0</div>

<div class="statTitle">Signal Strength</div>
<div id="signalVal">0</div>

<div class="statTitle">Quality Score</div>
<div id="qualityVal">--</div>
</div>

<div class="box">
<div class="statTitle">Best Comparison Result</div>
<div id="compareBox">Run test to compare networks</div>
</div>
</div>

<!-- MAP -->
<div id="map"></div>

<script>
const map = L.map("map").setView([22.9734,78.6569],5);

L.tileLayer(
"https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png"
).addTo(map);

/* ================= NETWORK TOWERS ================= */
const towers = {
Jio:[[28.6,77.2],[19.1,72.8]],
Airtel:[[28.7,77.1],[13.0,80.2]],
Vi:[[19.0,72.9],[22.5,88.3]],
BSNL:[[26.9,75.8],[17.4,78.4]]
};

/* ================= SIGNAL ================= */
function signal(lat,lng,op){
let s=0;
towers[op].forEach(t=>{
let d=Math.hypot(lat-t[0],lng-t[1]);
s+=1/(d+0.1);
});
return Math.min(s*60,100);
}

/* ================= QUALITY ================= */
function quality(speed,ping,signal){
let q = (speed*0.5)+(signal*0.4)-(ping*0.3);

if(q>70) return {text:"EXCELLENT",cls:"good"};
if(q>40) return {text:"GOOD",cls:"mid"};
return {text:"POOR",cls:"bad"};
}

/* ================= CHART ================= */
const chart = new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Jio","Airtel","Vi","BSNL"],
datasets:[{
label:"Network Score",
data:[0,0,0,0],
backgroundColor:["#00ff88","#00c6ff","#ffd000","#ff4d4d"]
}]
},
options:{
plugins:{legend:{display:false}},
responsive:true
}
});

/* ================= UPDATE CHART ================= */
function updateChart(j,a,v,b){
chart.data.datasets[0].data=[j,a,v,b];
chart.update();
}

/* ================= RUN TEST ================= */
function runTest(){

navigator.geolocation.getCurrentPosition(pos=>{

const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

const speed=Math.random()*100;
const ping=Math.random()*60;

/* operator */
const op=document.getElementById("operator").value;

const sig = signal(lat,lng,op);
const q = quality(speed,ping,sig);

/* ALL SCORES */
const jio = quality(speed,ping,signal(lat,lng,"Jio")).text==="EXCELLENT"?90:60;
const airtel = quality(speed,ping,signal(lat,lng,"Airtel")).text==="EXCELLENT"?88:55;
const vi = quality(speed,ping,signal(lat,lng,"Vi")).text==="EXCELLENT"?80:50;
const bsnl = quality(speed,ping,signal(lat,lng,"BSNL")).text==="EXCELLENT"?70:45;

/* BEST */
let best="Jio";
let max=jio;

if(airtel>max){max=airtel;best="Airtel";}
if(vi>max){max=vi;best="Vi";}
if(bsnl>max){best="BSNL";}

/* UI LEFT */
document.getElementById("status").innerHTML=
`Speed: ${speed.toFixed(1)} Mbps<br>
Ping: ${ping.toFixed(1)} ms<br>
Signal: ${sig.toFixed(1)}`;

document.getElementById("best").innerHTML=
"🏆 Best Network: <b>"+best+"</b>";

updateChart(jio,airtel,vi,bsnl);

/* RIGHT PANEL */
document.getElementById("selectedOp").innerText=op;
document.getElementById("speedVal").innerText=speed.toFixed(1);
document.getElementById("pingVal").innerText=ping.toFixed(1);
document.getElementById("signalVal").innerText=sig.toFixed(1);
document.getElementById("qualityVal").innerHTML=
`<span class="${q.cls}">${q.text}</span>`;

/* MAP */
L.circleMarker([lat,lng],{
radius:8,
color:"#00ff88"
}).addTo(map);

map.setView([lat,lng],10);

});
}
</script>

</body>
</html>
